<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name to Galaxy</title>
  <meta property="og:title" content="Name to Galaxy">
  <meta property="og:description" content="Type any name and watch the browser render a unique procedural galaxy seeded from your name. Download your galaxy.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benlirio.com/name-to-galaxy/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div id="app">
    <header id="pre-state">
      <h1 class="headline">Your name.<br>Your universe.</h1>
      <p class="subline">Every name hides a galaxy. Enter yours to reveal it.</p>
    </header>

    <div id="input-section">
      <input
        type="text"
        id="name-input"
        placeholder="type a name..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="60"
      >
      <button id="generate-btn">Generate</button>
      <p id="error-msg" class="error-msg" aria-live="polite"></p>
    </div>

    <div id="loading-section" style="display:none">
      <p class="loading-text">computing your nebula...<br><span class="loading-sub">(checking 14 billion stars)</span></p>
    </div>

    <div id="result-section" style="display:none">
      <p id="galaxy-label" class="galaxy-label"></p>
      <canvas id="galaxy-canvas"></canvas>
      <p id="galaxy-fact" class="galaxy-fact"></p>
      <div class="result-actions">
        <button id="download-btn" class="action-btn">Download my galaxy</button>
        <button id="share-btn" class="action-btn secondary">Share</button>
      </div>
      <button id="new-galaxy-btn" class="reset-btn">try another name</button>
    </div>
  </div>
</body>
</html>
